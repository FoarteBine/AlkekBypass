<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V12 Bypass Encoder</title>
    <style>
        body {
            background-color: #141419;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1c1c23;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            border: 1px solid #3c3c4b;
        }
        h2 {
            text-align: center;
            color: #ff3c3c;
            margin-top: 0;
            font-size: 18px;
            letter-spacing: 1px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: #191923;
            border: 1px solid #2d2d37;
            border-radius: 6px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 14px;
            margin-bottom: 15px;
        }
        textarea:focus {
            outline: none;
            border-color: #ff3c3c;
        }
        .output-label {
            font-size: 12px;
            color: #96ff96;
            margin-bottom: 5px;
            display: block;
        }
        #output {
            background-color: #121217;
            min-height: 50px;
            word-break: break-all;
            cursor: pointer;
            border: 1px dashed #444;
        }
        .copy-hint {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>V12 BYPASS ENCODER</h2>
    
    <span class="output-label">INPUT MESSAGE:</span>
    <textarea id="input" placeholder="Enter your message here..."></textarea>

    <span class="output-label">BYPASSED RESULT (Click to Copy):</span>
    <textarea id="output" readonly placeholder="The result will appear here..."></textarea>
    
    <div class="copy-hint">The result is copied automatically on click</div>
</div>

<script>
    const libV12 = {
        "a": "Ԭ", "b": "।ว", "c": "ჺ", "d": "Ԁ", "e": "ə", 
        "f": "ƭ", "g": "ꬶ", "h": "lา", "i": "ι", "j": "ɉ", 
        "k": "К", "l": "ℓ", "m": "।าา", "n": "।า", "o": "ο", 
        "p": "ρ", "q": "զ", "r": "ꝼ", "s": "ร", "t": "₸", 
        "u": "ιɹ", "v": "ѵ", "w": "พ", "x": "ꭖ", "y": "ʏ", "z": "ȥ"
    };

    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');

    inputArea.addEventListener('input', () => {
        const text = inputArea.value.toLowerCase();
        let result = "";
        
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            result += libV12[char] || char;
        }
        
        outputArea.value = result;
    });

    outputArea.addEventListener('click', () => {
        if (outputArea.value) {
            outputArea.select();
            document.execCommand('copy');
            
            const originalColor = outputArea.style.borderColor;
            outputArea.style.borderColor = "#96ff96";
            setTimeout(() => {
                outputArea.style.borderColor = originalColor;
            }, 500);
        }
    });
</script>

</body>
</html>
